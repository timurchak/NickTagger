name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Tag '$tag' must look like v1.2.3 or v1.2.3-beta"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build package
        shell: pwsh
        run: |
          ./package.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Detect prerelease
        id: prerelease
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $isPrerelease = if ($version -match '-') { 'true' } else { 'false' }
          "value=$isPrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.prerelease.outputs.value }}
          files: dist/*.zip
